name: viam_chartplotter_mobile
description: "Phase 0 spike: native Flutter chartplotter on Viam's SDK."
publish_to: "none"
version: 0.0.1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # Viam Flutter SDK — boat (RobotClient/WebRTC) + cloud (app/data) access.
  # Beta: pin and re-verify symbol names when bumping.
  viam_sdk: ^0.3.0
  # Leaflet-style map: reuses the Go server's XYZ raster tiles directly.
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # app.viam.com login: OAuth 2.0 + PKCE via the system browser, then feed the
  # access token to Viam.withAccessToken. Tokens kept in the platform keystore.
  flutter_appauth: ^8.0.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
