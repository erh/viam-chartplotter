<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 73" width="24" height="73">
  <!-- AIS variant of the top-down boat icon. Same shape as myBoat so the
       size-comparison between own ship and AIS targets reads cleanly, but
       a red/orange hull so other vessels are visually distinct from us. -->
  <path d="M 12 1
           C 18 6, 22 14, 22 24
           L 22 64
           Q 22 71, 16 71
           L 8 71
           Q 2 71, 2 64
           L 2 24
           C 2 14, 6 6, 12 1 Z"
        fill="#b91c1c"
        stroke="#fde68a"
        stroke-width="1.2"
        stroke-linejoin="round"/>
  <path d="M 12 20
           L 18 28
           L 18 48
           Q 18 50, 16 50
           L 8 50
           Q 6 50, 6 48
           L 6 28 Z"
        fill="#fef3c7"
        stroke="#7f1d1d"
        stroke-width="0.6"
        stroke-linejoin="round"/>
</svg>
